<section class="login">
  <div class="card">
    <h1>GymCulture Pro</h1>
    <p class="subtitle">Admin Portal</p>
    <button (click)="signIn()" [disabled]="loading" class="google-btn">
      <span *ngIf="!loading">Continue with Google</span>
      <span *ngIf="loading">Signing in…</span>
    </button>
    <p class="error" *ngIf="error">{{ error }}</p>
  </div>
</section>
