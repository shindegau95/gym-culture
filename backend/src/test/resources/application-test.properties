spring.application.name=gymculture-backend-test

# Default: Testcontainers spins fresh PostgreSQL 16 per test run.
# Override via TEST_DATABASE_URL/USER/PASSWORD/DRIVER when local Docker
# is incompatible with Testcontainers (e.g. point at docker-compose db).
spring.datasource.url=${TEST_DATABASE_URL:jdbc:tc:postgresql:16:///gymculture}
spring.datasource.driver-class-name=${TEST_DATABASE_DRIVER:org.testcontainers.jdbc.ContainerDatabaseDriver}
spring.datasource.username=${TEST_DATABASE_USER:test}
spring.datasource.password=${TEST_DATABASE_PASSWORD:test}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.clean-disabled=false

# Firebase placeholders so context loads in tests
gymculture.firebase.credentials-path=test
gymculture.firebase.project-id=test

app.owner-name=thegymculture.in
