spring.application.name=vis-backend-test

# Disable security under test profile — SecurityConfig + FirebaseConfig are
# both @Profile("!test"); without these excludes Spring's default autoconfig
# would still apply HTTP Basic to every endpoint.
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,\
  org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration,\
  org.springframework.boot.actuate.autoconfigure.security.servlet.ManagementWebSecurityAutoConfiguration

# Default: Testcontainers spins fresh PostgreSQL 16 per test run.
# Override via TEST_DATABASE_URL/USER/PASSWORD/DRIVER when local Docker
# is incompatible with Testcontainers (e.g. point at docker-compose db).
spring.datasource.url=${TEST_DATABASE_URL:jdbc:tc:postgresql:16:///vis}
spring.datasource.driver-class-name=${TEST_DATABASE_DRIVER:org.testcontainers.jdbc.ContainerDatabaseDriver}
spring.datasource.username=${TEST_DATABASE_USER:test}
spring.datasource.password=${TEST_DATABASE_PASSWORD:test}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.clean-disabled=false

# Firebase placeholders so context loads in tests
vis.firebase.credentials-path=test
vis.firebase.project-id=test

app.owner-name=vis
